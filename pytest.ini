[pytest]
pythonpath = .
testpaths = tests
markers =
    smoke: Quick smoke tests for basic functionality
    regression: Full regression test suite
    negative: Negative and error handling tests
    contract: API contract/schema validation tests
    e2e: End-to-end workflow tests
    performance: Response time and performance tests
    boundary: Boundary value and edge case tests
    headers: HTTP header validation tests
    idempotency: Idempotency verification tests
addopts = -v --tb=short --strict-markers
log_cli = true
log_cli_level = INFO
